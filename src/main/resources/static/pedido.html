<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Novo Pedido</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body onload="carregarDadosPedido()">

<header class="header">
    <h1>Tira Pedidos Web</h1>
</header>

<div class="container">
    <h2>Novo Pedido</h2>

    <div class="form-group">
        <label>Cliente:</label>
        <select id="clienteSelect"></select>
    </div>

    <div class="form-group">
        <label>Produto:</label>
        <select id="produtoSelect" onchange="atualizarPreco(); calcularTotal();"></select>
    </div>

    <div class="form-group">
        <label>Preço:</label>
        <input type="text" id="preco" readonly>
    </div>

    <div class="form-group">
        <label>Quantidade:</label>
        <input type="number" id="quantidade" oninput="calcularTotal()">
    </div>
    
    <div class="form-group">
        <label>Valor Total:</label>
        <input type="text" id="valorTotal" readonly>
    </div>

    <button class="btn" onclick="salvarPedido()">Salvar Pedido</button>
    <br><br>

    <a href="index.html">
        <button class="btn-voltar">Voltar</button>
    </a>
</div>

<script src="js/script.js"></script>
</body>
</html>
